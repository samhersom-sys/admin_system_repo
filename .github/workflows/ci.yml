name: CI

on:
  pull_request:
    branches:
      - testing
      - production
  push:
    branches:
      - testing
      - production

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --runInBand

      - name: Run frontend scan tests
        working-directory: frontend
        run: npm run test:scan

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  website:
    name: Website
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Build website
        working-directory: website
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: policyforge
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: policyforge_cleaned
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U policyforge -d policyforge_cleaned"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://policyforge:changeme@127.0.0.1:5432/policyforge_cleaned
      BACKEND_URL: http://127.0.0.1:5000
      JWT_SECRET: ci-jwt-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/nest/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install Nest backend dependencies
        working-directory: backend/nest
        run: npm ci

      - name: Run database migrations
        run: npm run db:migrate

      - name: Seed ephemeral CI database
        env:
          NODE_ENV: development
        run: npm run db:seed

      - name: Start Express backend for integration tests
        env:
          PORT: 5000
          NODE_ENV: test
        run: |
          nohup node backend/server.js > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:5000/api/health > /dev/null; then
              echo "Backend is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start"
          cat backend.log
          exit 1

      - name: Run backend integration tests
        run: npm run test:backend

      - name: Build Nest backend
        run: npm run build:backend

      - name: Show backend log
        if: always()
        run: |
          if [ -f backend.log ]; then
            sed -n '1,200p' backend.log
          fi

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill $(cat backend.pid) || true
          fi